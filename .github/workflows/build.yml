name: Build

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.output }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            output: jpm-linux-amd64
            cgo_enabled: "0"
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            output: jpm-linux-arm64
            cgo_enabled: "0"
          - os: windows-latest
            goos: windows
            goarch: amd64
            output: jpm-windows-amd64.exe
            cgo_enabled: "0"
          - os: macos-latest
            goos: darwin
            goarch: arm64
            output: jpm-darwin-arm64
            cgo_enabled: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: service/webgui/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: service/webgui/pnpm-lock.yaml

      - name: Install webgui dependencies
        working-directory: service/webgui
        run: pnpm install --frozen-lockfile

      - name: Build webgui
        working-directory: service/webgui
        run: pnpm build

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo_enabled }}
        run: go build -o ${{ matrix.output }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
